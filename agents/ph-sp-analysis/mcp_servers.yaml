# MCP servers for this agent only. Reference by key in profile.yaml (mcp_servers.postgres).
# Per-agent env (PH_SP_DATABASE_URL) belongs in profile.yaml, not here.
#
# Package: mcp-postgres@latest (read-only via DB_READ_ONLY)
# Tools: postgres_list_tables, postgres_describe_table, postgres_get_schema, postgres_query_data
servers:
  postgres:
    command: ${NPX_PATH:-npx}
    args:
      - -y
      - mcp-postgres@latest
