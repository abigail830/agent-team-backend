id: yl-worker1
name: "YL-Worker-001"
description: "伊利奶粉分仓补货供应链分析助手"

model_provider: azure_anthropic
model: ${CLAUDE_AZURE_FOUNDRY_MODEL}
prompt_file: system_prompt.md
skills_dir: skills

mcp_servers:
  postgres:
    env:
      DATABASE_URL: ${YL_DATABASE_URL}
      DB_READ_ONLY: "true"

allowed_tools:
  - list_sql_results
  - postgres_list_tables
  - postgres_describe_table
  - postgres_get_schema
  - postgres_query_data
  # - suggest_visualization 

hooks:
  sql_validator:
    max_rows: 2000
  result_truncator:
    max_observation_bytes: 50000
  # sql_viz:
  #   auto: false
  #   min_rows: 3

memory:
  working_set_turns: 15
  cold_resume_max_turns: 10
  slim:
    enabled: true
    default_preview_chars: 200
