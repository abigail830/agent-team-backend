id: sg-sp-analysis
name: "Proposal Analyst - SG"
description: "Smart Proposal SG usage, product mix, pricing, and deal analytics (read-only PostgreSQL)"

model_provider: azure_anthropic
model: ${CLAUDE_AZURE_FOUNDRY_MODEL}
prompt_file: system_prompt.md
skills_dir: skills

mcp_servers:
  postgres:
    env:
      DB_HOST: ${SG_SP_DB_HOST}
      DB_PORT: ${SG_SP_DB_PORT:-5432}
      DB_USER: ${SG_SP_DB_USER}
      DB_PASSWORD: ${SG_SP_DB_PASSWORD}
      DB_NAME: ${SG_SP_DB_NAME:-smart_proposal_sg}
      DB_SSL_MODE: require
      DB_READ_ONLY: "true"

allowed_tools:
  - list_sql_results
  - suggest_visualization
  - postgres_list_tables
  - postgres_describe_table
  - postgres_get_schema
  - postgres_query_data

hooks:
  sql_validator:
    max_rows: 2000
  result_truncator:
    max_observation_bytes: 50000
  sql_viz:
    auto: false
    min_rows: 3

memory:
  working_set_turns: 15
  cold_resume_max_turns: 10
  slim:
    enabled: true
    default_preview_chars: 200
