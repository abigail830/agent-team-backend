id: yl-worker2
name: "YL-Worker-002"
description: "伊利成人营养品事业部调度管理组工作助手（本体驱动）"

model_provider: azure_anthropic
model: ${CLAUDE_AZURE_FOUNDRY_MODEL}
prompt_file: system_prompt.md
skills_dir: skills

mcp_servers: {}

allowed_tools:
  - get_order_gap
  - get_ship_gap
  - get_order_progress
  - get_current_stock_rate
  - eval_national_supply_status
  - eval_target_stock_rate
  - calc_replenishment_quantity
  - query_inventory_snapshot
  - query_batch_big_date_inventory
  - query_base_warehouse_availability
  - query_national_inventory_summary
  - query_snapshot_catalog
  - list_products
  - list_warehouses
  - search_products
  - search_warehouses
  - resolve_entity
  - list_entity_types
  - describe_entity_type
  - list_sources
  - describe_table
  - query_source
  - follow_ref
  - propose_fulfillment_forms
  - list_pending_allocation_orders
  - simulate_allocation_effect
  - save_forward_allocation_draft
  - save_lateral_allocation_draft
  - update_allocation_quantity
  - activate_allocation_and_push
  - cancel_allocation_order

hooks:
  result_truncator:
    max_observation_bytes: 80000

memory:
  working_set_turns: 12
  cold_resume_max_turns: 8
  slim:
    enabled: true
    default_preview_chars: 300
