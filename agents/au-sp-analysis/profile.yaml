id: au-sp-analysis
name: "Proposal Analyst - AU"
description: "Smart Proposal AU usage, product mix, pricing, and deal analytics (read-only MySQL)"

model_provider: azure_anthropic
model: ${CLAUDE_AZURE_FOUNDRY_MODEL}
prompt_file: system_prompt.md
skills_dir: skills

mcp_servers:
  mysql:
    env:
      MYSQL_HOST: ${AU_SP_MYSQL_HOST}
      MYSQL_PORT: ${AU_SP_MYSQL_PORT}
      MYSQL_USER: ${AU_SP_MYSQL_USER}
      MYSQL_PASS: ${AU_SP_MYSQL_PASSWORD}
      MYSQL_DB: ${AU_SP_MYSQL_DATABASE}
      MYSQL_SSL: "true"
      ALLOW_INSERT_OPERATION: "false"
      ALLOW_UPDATE_OPERATION: "false"
      ALLOW_DELETE_OPERATION: "false"
      ALLOW_DDL_OPERATION: "false"
allowed_tools:
  - list_sql_results
  - suggest_visualization
  - mysql_query

hooks:
  sql_validator:
    max_rows: 2000
  result_truncator:
    max_observation_bytes: 50000
  sql_viz:
    auto: false
    min_rows: 3

memory:
  working_set_turns: 15
  cold_resume_max_turns: 10
  slim:
    enabled: true
    default_preview_chars: 200  