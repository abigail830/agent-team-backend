# MCP servers for this agent only. Reference by key in profile.yaml (mcp_servers.mysql).
# Per-agent env (MYSQL_*, credentials) belongs in profile.yaml, not here.
#
# Package: @benborla29/mcp-server-mysql (read-only by default, supports remote DB + SSL)
# Tool: mysql_query
servers:
  mysql:
    command: ${NPX_PATH:-npx}
    args:
      - -y
      - "@benborla29/mcp-server-mysql"
